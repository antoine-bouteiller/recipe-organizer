name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - src/**/*
      - .github/workflows/deploy-production.yaml

jobs:
  quality-checks:
    name: Quality Checks
    secrets: inherit
    uses: ./.github/workflows/quality-checks.yaml

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: quality-checks
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: voidzero-dev/setup-vp@8ecb39174989ce55af90f45cf55b02738599831d # v1.6.0
        with:
          node-version: '24'
          cache: true

      - uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6.0.1

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Build project
        run: vp build
        env:
          VITE_PUBLIC_URL: ${{ vars.VITE_PUBLIC_URL }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
