name: Quality Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
  workflow_call:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: voidzero-dev/setup-vp@329490fff19dd4ecd8ff2a74d7c45bee0448f3a6 # v1.11.0
        with:
          node-version: '24'
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Run linter
        run: vp check

  knip:
    name: Knip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: voidzero-dev/setup-vp@329490fff19dd4ecd8ff2a74d7c45bee0448f3a6 # v1.11.0
        with:
          node-version: '24'
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Run knip
        run: vp run knip
