version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    groups:
      all-dependencies:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    commit-message:
      prefix: 'chore(deps):'
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: 'chore(deps):'
