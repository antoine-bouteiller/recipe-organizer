commit-msg:
  commands:
    lint-commit-msg:
      run: pnpm commitlint --edit
pre-commit:
  parallel: true
  jobs:
    - name: Check Lockfile
      run: pnpm i --frozen-lockfile --silent
    - name: Check
      glob: '*'
      run: pnpm check {staged_files}
      stage_fixed: true
    - name: Knip
      run: pnpm knip
